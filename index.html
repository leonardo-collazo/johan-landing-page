<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />

    <title>Rise & Shine Home Services</title>

    <link
      rel="shortcut icon"
      href="./src/assets/pictures/logo.png"
      type="image/x-icon"
    />

    <!-- Styles -->
    <link
      rel="stylesheet"
      href="./src/css/output.css"
    />
    <link
      rel="stylesheet"
      href="./src/css/styles.css"
    />
    <link
      rel="stylesheet"
      href="./src/css/social-medias.css"
    />
    <link
      rel="stylesheet"
      href="./src/css/burger-icon.css"
    />
    <link
      rel="stylesheet"
      href="./src/css/mobile-menu.css"
    />

    <!-- Scripts -->
    <script
      type="module"
      src="./src/js/language/load-language.js"
    ></script>
    <script
      type="module"
      src="./src/js/language/load-language-icon.js"
    ></script>
    <script
      type="module"
      src="./src/js/language/change-language.js"
    ></script>
    <script
      type="module"
      src="./src/js/language/change-language-icon.js"
    ></script>
    <script
      type="module"
      src="./src/js/header/header-manager.js"
      defer
    ></script>

    <!-- Fonts -->
    <link
      rel="preconnect"
      href="https://fonts.googleapis.com"
    />
    <link
      rel="preconnect"
      href="https://fonts.gstatic.com"
      crossorigin
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Serif:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
  </head>

  <body>
    <header
      id="header"
      class="w-full"
    >
      <!-- Top Bar -->
      <div
        class="w-full max-w-[1024px] h-[var(--header-height)] flex flex-row justify-between items-center gap-1 mobile-medium:gap-2 mx-auto p-2 mobile-large:p-3 md:p-4"
      >
        <!-- Header Left Section -->
        <a
          href="#"
          class="flex flex-row justify-between items-center gap-2"
        >
          <!-- Logo -->
          <img
            src="./src/assets/pictures/logo.png"
            alt="logo"
            class="w-16"
          />

          <!-- Company Name -->
          <h1
            id="company-name"
            class="inline-block max-w-[140px] mobile-medium:max-w-[180px] mobile-large:max-w-[220px] mobile-xl:max-w-none text-lg mobile-large:text-xl md:text-2xl lg:text-3xl text-left font-semibold gold-shine"
          >
            Rise & Shine Home Services
          </h1>
        </a>

        <!-- Header Right Section -->
        <div
          class="flex flex-row justify-between items-center gap-1 mobile-medium:gap-2"
        >
          <!-- Tabs -->
          <div
            class="hidden lg:flex flex-row justify-center items-center gap-3"
          >
            <a href="#about">
              <div
                id="about-tab"
                class="px-3 py-2 border-2 border-solid rounded-xl border-transparent text-white hover:text-green-500 hover:border-green-500 transform duration-300"
              >
                <p
                  i18n="about-tab"
                  class="text-xl font-semibold"
                >
                  About
                </p>
              </div>
            </a>

            <a href="#services">
              <div
                id="services-tab"
                class="px-3 py-2 border-2 border-solid rounded-xl border-transparent text-white hover:text-green-500 hover:border-green-500 transform duration-300"
              >
                <p
                  i18n="services-tab"
                  class="text-xl font-semibold"
                >
                  Services
                </p>
              </div>
            </a>

            <a href="#contact">
              <div
                id="contact-tab"
                class="px-3 py-2 border-2 border-solid rounded-xl border-transparent text-white hover:text-green-500 hover:border-green-500 transform duration-300"
              >
                <p
                  i18n="contact-tab"
                  class="text-xl font-semibold"
                >
                  Contact
                </p>
              </div>
            </a>
          </div>

          <!-- Language Icon -->
          <img
            id="language-icon"
            class="w-10 p-1 cursor-pointer animate__animated"
            src="./src/assets/icons/default-language.svg"
            alt="language icon"
          />

          <!-- Burger Icon -->
          <div
            id="burger-icon"
            class="burger-icon__toggle"
          >
            <div
              id="burger-icon__bar1"
              class="burger-icon__bar"
            ></div>
            <div
              id="burger-icon__bar2"
              class="burger-icon__bar"
            ></div>
            <div
              id="burger-icon__bar3"
              class="burger-icon__bar"
            ></div>
          </div>
        </div>
      </div>

      <!-- Mobile Menu -->
      <div
        id="mobile-menu"
        class="mobile-menu animate__animated"
      >
        <div
          id="mobile-menu__container"
          class="mobile-menu__container"
        >
          <a href="#about">
            <div class="mobile-menu__element">
              <p
                i18n="about-option"
                class="mobile-menu__label"
              >
                About
              </p>
            </div>
          </a>

          <a href="#services">
            <div class="mobile-menu__element">
              <p
                i18n="services-option"
                class="mobile-menu__label"
              >
                Services
              </p>
            </div>
          </a>

          <a href="#contact">
            <div class="mobile-menu__element">
              <p
                i18n="contact-option"
                class="mobile-menu__label"
              >
                Contact
              </p>
            </div>
          </a>
        </div>
      </div>
    </header>

    <main class="bg-[var(--black)]">
      <!-- Hero Section -->
      <section
        id="hero"
        class="h-[calc(100vh-var(--header-height))] bg-hero-background-small-2 mobile-large:bg-hero-background-medium-2 lg:bg-hero-background-large-2 bg-cover bg-no-repeat"
      >
        <div
          class="w-full h-full max-w-[1024px] flex flex-col justify-center items-center gap-24 px-6"
        >
          <h1
            i18n="hero-section-header-1"
            class="w-fit text-3xl mobile-large:text-6xl md:text-7xl lg:text-8xl text-center text-[var(--gold)] font-semibold text-black-outline underline decoration-[var(--black)]"
          >
            Trusted Cleaning Company
          </h1>

          <p
            i18n="hero-section-info-1"
            class="w-fit text-4xl md:text-xl lg:text-2xl text-center text-[var(--gold)] text-black-outline font-bold"
          >
            SOLUTION AMAZING
          </p>

          <button type="button">
            <a
              class="flex justify-center items-center gap-3 px-4 py-2 rounded-md border-solid border-2 border-[var(--black)] bg-[var(--gold)] hover:brightness-75 transition-all duration-300"
              href="#services"
              ><span
                i18n="hero-section-button-1"
                class="text-lg text-black"
              >
                Read More
              </span>
              <div
                class="w-9 h-9 pr-[10px] bg-[var(--black)] rounded-md flex items-center justify-center"
              >
                <svg
                  xmlns="http://www.w3.org/2000/svg"
                  class="w-full h-full text-[var(--gold)]"
                  fill="none"
                  viewBox="0 0 24 24"
                  stroke="currentColor"
                  stroke-width="3"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                >
                  <path d="M14 5l7 7-7 7" />
                </svg>
              </div>
            </a>
          </button>
        </div>
      </section>
    </main>
  </body>
</html>
